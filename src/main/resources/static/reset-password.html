<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重置密码 - SyncBoard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .reset-container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-section {
            text-align: center;
            margin-bottom: 35px;
        }

        .logo {
            font-size: 48px;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .link-text {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-top: 20px;
        }

        .link-text a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }

        .link-text a:hover {
            text-decoration: underline;
        }

        .error-message {
            background: #ffebee;
            color: #f44336;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .error-message.show {
            display: block;
            animation: shake 0.3s ease;
        }

        .success-message {
            background: #e8f5e9;
            color: #4caf50;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .info-text {
            background: #e3f2fd;
            color: #1976d2;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            line-height: 1.5;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .reset-container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="reset-container">
        <div class="logo-section">
            <div class="logo">🔑</div>
            <h1>重置密码</h1>
            <p class="subtitle">输入注册信息来重置密码</p>
        </div>

        <div class="info-text">
            <strong>提��：</strong>请输入您注册时使用的用户名和邮箱，验证通过后即可设置新密码。
        </div>

        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>

        <form id="resetForm" onsubmit="handleReset(event)">
            <div class="form-group">
                <label for="username">用户名</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    required
                    placeholder="输入注册时的用户名"
                    autocomplete="username"
                >
            </div>

            <div class="form-group">
                <label for="email">邮箱</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    required
                    placeholder="输入注册时的邮箱"
                    autocomplete="email"
                >
            </div>

            <div class="form-group">
                <label for="newPassword">新密码</label>
                <input
                    type="password"
                    id="newPassword"
                    name="newPassword"
                    required
                    minlength="6"
                    maxlength="20"
                    placeholder="输入新密码（6-20个字符）"
                    autocomplete="new-password"
                >
            </div>

            <div class="form-group">
                <label for="confirmPassword">确认新密码</label>
                <input
                    type="password"
                    id="confirmPassword"
                    name="confirmPassword"
                    required
                    minlength="6"
                    maxlength="20"
                    placeholder="再次输入新密码"
                    autocomplete="new-password"
                >
            </div>

            <button type="submit" class="btn btn-primary" id="resetBtn">
                重置密码
            </button>
        </form>

        <p class="link-text">
            想起密码了？
            <a href="login.html">返回登录</a>
        </p>
    </div>

    <script>
        // 自动检测 API 地址
        const API_BASE = window.location.protocol + '//' + window.location.hostname + ':8080/api';

        async function handleReset(event) {
            event.preventDefault();

            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // 清除之前的消息
            hideMessages();

            // 验证输入
            if (!username || !email || !newPassword || !confirmPassword) {
                showError('请填写所有字段');
                return;
            }

            if (newPassword.length < 6 || newPassword.length > 20) {
                showError('密码长度必须在6-20个字符之间');
                return;
            }

            if (newPassword !== confirmPassword) {
                showError('两次密码输入不一致');
                return;
            }

            const resetBtn = document.getElementById('resetBtn');
            resetBtn.disabled = true;
            resetBtn.textContent = '重置中...';

            try {
                const response = await fetch(`${API_BASE}/users/reset-password`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username,
                        email,
                        newPassword,
                        confirmPassword
                    })
                });

                const result = await response.json();

                if (result.code === 200) {
                    // 重置成功
                    showSuccess('密码重置成功！3秒后跳转到登录页面...');

                    // 禁用表单
                    document.getElementById('resetForm').reset();
                    document.getElementById('username').disabled = true;
                    document.getElementById('email').disabled = true;
                    document.getElementById('newPassword').disabled = true;
                    document.getElementById('confirmPassword').disabled = true;
                    resetBtn.style.display = 'none';

                    // 3秒后跳转到登录页面
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 3000);
                } else {
                    showError(result.message || '重置密码失败');
                    resetBtn.disabled = false;
                    resetBtn.textContent = '重置密码';
                }
            } catch (error) {
                console.error('重置密码错误:', error);
                showError('网络错误，请检查服务是否启动');
                resetBtn.disabled = false;
                resetBtn.textContent = '重置密码';
            }
        }

        function showError(message) {
            hideMessages();
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.classList.add('show');

            setTimeout(() => {
                errorDiv.classList.remove('show');
            }, 5000);
        }

        function showSuccess(message) {
            hideMessages();
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.classList.add('show');
        }

        function hideMessages() {
            document.getElementById('errorMessage').classList.remove('show');
            document.getElementById('successMessage').classList.remove('show');
        }
    </script>
</body>
</html>
