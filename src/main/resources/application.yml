# ============================================
# SyncBoard 应用配置文件
# ============================================

server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: syncboard

  # 数据库配置
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      driver-class-name: com.mysql.cj.jdbc.Driver
      url: jdbc:mysql://localhost:3306/syncboard?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      username: root
      password: EA7music666
      # 连接池配���
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      # 监控统计
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        reset-enable: false
      filter:
        stat:
          log-slow-sql: true
          slow-sql-millis: 2000

  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 3000ms

  # JSON 配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.syncboard.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# 日志配置
logging:
  level:
    root: INFO
    com.syncboard: DEBUG
    com.syncboard.mapper: DEBUG
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n'
    file: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n'
  file:
    name: logs/syncboard.log
    max-size: 10MB
    max-history: 30

# WebSocket 配置
websocket:
  # 允许的来源
  allowed-origins: "*"
  # 消息代理前缀
  broker-prefix: /topic
  # 应用目的地前缀
  app-prefix: /app
  # 用户目的地前缀
  user-prefix: /user

# 业务配置
syncboard:
  # 拖拽排序算法配置
  fractional-indexing:
    base: 64
    # 排序精度(小数位数)
    precision: 10
  # 在线用户超时时间(秒)
  presence:
    timeout: 300
  # Redis 频道前缀
  redis:
    channel-prefix: "syncboard:board:"
