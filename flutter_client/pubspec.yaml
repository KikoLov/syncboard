name: syncboard_client
description: SyncBoard 实时协作任务平台 - Flutter客户端
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # WebSocket 客户端（支持 STOMP 协议）
  stomp_web_socket: ^1.0.0

  # HTTP 请求
  http: ^1.1.0

  # 状态管理
  provider: ^6.1.1

  # JSON 序列化
  json_annotation: ^4.8.1

  # 拖拽排序
  flutter_draggable_gridview: ^0.0.5

  # UI 组件
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.7
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
